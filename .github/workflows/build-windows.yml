name: Build Windows Portable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: md2docx_tool

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Pandoc
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $Version = "3.6.4"
          $Url = "https://github.com/jgm/pandoc/releases/download/$Version/pandoc-$Version-windows-x86_64.zip"
          New-Item -ItemType Directory -Force -Path vendor\pandoc | Out-Null
          Invoke-WebRequest -Uri $Url -OutFile pandoc.zip
          Expand-Archive -Path pandoc.zip -DestinationPath pandoc_tmp -Force
          Copy-Item -Force -Path "pandoc_tmp\pandoc-$Version\pandoc.exe" -Destination "vendor\pandoc\pandoc.exe"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build GUI
        run: |
          pyinstaller --noconfirm --clean --onedir --windowed `
            --name md2docx_gui `
            --add-data "vendor\pandoc\pandoc.exe;vendor\pandoc" `
            md2docx_gui.py

      - name: Build CLI
        run: |
          pyinstaller --noconfirm --clean --onedir `
            --name md2docx_cli `
            --add-data "vendor\pandoc\pandoc.exe;vendor\pandoc" `
            md2docx_cli.py

      - name: Upload artifact (GUI)
        uses: actions/upload-artifact@v4
        with:
          name: md2docx_gui_portable
          path: md2docx_tool/dist/md2docx_gui/

      - name: Upload artifact (CLI)
        uses: actions/upload-artifact@v4
        with:
          name: md2docx_cli_portable
          path: md2docx_tool/dist/md2docx_cli/
